<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="hero">
        <img src="assets/Hero_Part.png" alt="Hero Header">
    </div>
    <div class="elContainer">
        <div class="about-me">
            <img src="assets/About_Me.png" alt="About Me">
        </div>
        <div class="skills">
            <div class="html-css">
                <div class="html-skills">
                    <img src="assets/HTML.png" alt="html">
                    <h3 class="html-skills-text">HTML</h3>
                </div>
                <div class="css-skills">
                    <img src="assets/CSS.png" alt="css">
                    <h3 class="css-skills-text">CSS</h3>
                </div>
            </div>
            <div class="js-ui-ux">
                <div class="js-skills">
                    <img src="assets/JS.png" alt="javascript">
                    <h3 class="js-skills-text">JavaScript</h3>
                </div>
                <div class="ux-skills">
                    <img src="assets/UX_Des.png" alt="UI/UX Design">
                    <h3 class="ux-skills-text">UI/UX Design</h3>
                </div>
            </div>
        </div>
    </div>
    <div class="project-collection-text">
        <h1 class="pro-collect-h1">プロジェクトコレクション</h1>
        <h3 class="pro-collect-h3">(Project Collections)</h3>
    </div>
    <div class="project-collection-container">
        <div class="pro_1-2">
            <img src="assets/1.png" alt="Project 1">
            <img src="assets/2.png" alt="Project 2">
        </div>
        <div class="pro_3-5">
            <img src="assets/3.png" alt="Project 3">
            <img src="assets/4.png" alt="Project 4">
            <img src="assets/5.png" alt="Project 5">
        </div>
    </div>
</body>
</html>
